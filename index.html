<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Screencast</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

  :root {
    --bg:      #0f0f11;
    --surface: #1a1a1e;
    --border:  #2e2e36;
    --muted:   #6b6b7a;
    --text:    #e8e8f0;
    --accent:  #7c6ff7;
    --danger:  #e05c5c;
    --radius:  12px;
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 24px;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: .03em;
    color: var(--muted);
  }

  /* ── card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── button ── */
  button {
    all: unset;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 8px;
    padding: 11px 20px;
    font-size: .9rem;
    font-weight: 500;
    transition: opacity .15s, background .15s;
  }
  button:active { opacity: .75 }

  .btn-primary { background: var(--accent); color: #fff; width: 100% }
  .btn-primary:hover { background: #6a5ee8 }

  .btn-danger { background: var(--danger); color: #fff; width: 100% }
  .btn-danger:hover { background: #c94d4d }

  button:disabled { opacity: .4; cursor: not-allowed }

  /* ── share row ── */
  .share-row {
    display: flex;
    gap: 8px;
  }
  .share-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: .82rem;
    color: var(--muted);
    outline: none;
  }
  .share-row button {
    padding: 9px 14px;
    font-size: .82rem;
    background: var(--border);
    color: var(--text);
    border-radius: 8px;
  }
  .share-row button:hover { background: #3a3a46 }

  /* ── status badge ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: .8rem;
    color: var(--muted);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
  }
  .dot.live { background: #4caf7d; box-shadow: 0 0 6px #4caf7d99 }
  .dot.waiting { background: #e0a04a }

  /* ── video ── */
  #viewer-wrap {
    width: 100%;
    max-width: 960px;
    background: #000;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #viewer-wrap video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  #viewer-status {
    color: var(--muted);
    font-size: .9rem;
    text-align: center;
    padding: 20px;
  }

  /* ── preview pip ── */
  #preview {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 8px;
    object-fit: contain;
    display: none;
  }
  #preview.visible { display: block }

  .label { font-size: .78rem; color: var(--muted); font-weight: 500; letter-spacing: .04em; text-transform: uppercase }
</style>
</head>
<body>

<h1>⬡ Screencast</h1>

<!-- ═══ BROADCASTER UI ═════════════════════════════════════════════════════ -->
<div class="card" id="cast-card">
  <div class="badge" id="cast-status">
    <span class="dot" id="cast-dot"></span>
    <span id="cast-label">Idle</span>
  </div>

  <video id="preview" muted autoplay playsinline></video>

  <button class="btn-primary" id="cast-btn" onclick="startCast()">
    Share Screen
  </button>
  <button class="btn-danger" id="stop-btn" style="display:none" onclick="stopCast()">
    Stop Sharing
  </button>

  <div id="share-section" style="display:none; flex-direction:column; gap:10px">
    <span class="label">Share link</span>
    <div class="share-row">
      <input id="share-url" readonly>
      <button onclick="copyLink()">Copy</button>
    </div>
  </div>
</div>

<!-- ═══ VIEWER UI ══════════════════════════════════════════════════════════ -->
<div id="viewer-wrap" style="display:none">
  <video id="viewer" autoplay playsinline></video>
  <div id="viewer-status">Waiting for broadcast…</div>
</div>

<script>
// ── Mode detection ─────────────────────────────────────────────────────────
const isViewer = new URLSearchParams(location.search).has('watch')

if (isViewer) {
  document.getElementById('cast-card').style.display = 'none'
  document.getElementById('viewer-wrap').style.display = 'flex'
}

// ── WebSocket ──────────────────────────────────────────────────────────────
const proto = location.protocol === 'https:' ? 'wss' : 'ws'
const ws     = new WebSocket(`${proto}://${location.host}`)
ws.binaryType = 'arraybuffer'

// ═══ BROADCASTER LOGIC ════════════════════════════════════════════════════
let recorder = null
let stream   = null

async function startCast() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
    let msg = 'Screen sharing is not supported by this browser.'
    if (!window.isSecureContext) msg += ' Screen sharing requires a secure context (HTTPS).'
    alert(msg)
    return
  }

  try {
    try {
      stream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: { ideal: 30 }, cursor: 'always' },
        audio: true
      })
    } catch (e) {
      // Fallback: try without audio if first attempt fails
      if (e.name === 'NotAllowedError') throw e
      stream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: { ideal: 30 }, cursor: 'always' }
      })
    }

    // Show live preview
    const preview = document.getElementById('preview')
    preview.srcObject = stream
    preview.classList.add('visible')

    // Pick best supported codec
    const mimeType = [
      'video/webm;codecs=vp9,opus',
      'video/webm;codecs=vp8,opus',
      'video/webm'
    ].find(t => MediaRecorder.isTypeSupported(t))

    recorder = new MediaRecorder(stream, {
      mimeType,
      videoBitsPerSecond: 2_500_000
    })

    // Signal server
    ws.send(JSON.stringify({ type: 'start', mimeType }))

    // Send 100ms chunks → ~100ms latency
    recorder.ondataavailable = e => {
      if (e.data.size > 0 && ws.readyState === WebSocket.OPEN) ws.send(e.data)
    }
    recorder.start(100)

    // Stop when user clicks "Stop sharing" in browser chrome
    const videoTrack = stream.getVideoTracks()[0]
    if (videoTrack) videoTrack.addEventListener('ended', stopCast)

    // UI
    setCastStatus('live', 'Live')
    document.getElementById('cast-btn').style.display  = 'none'
    document.getElementById('stop-btn').style.display  = 'block'
    document.getElementById('share-section').style.display = 'flex'
    document.getElementById('share-url').value = `${location.origin}?watch`
  } catch (err) {
    if (err.name !== 'NotAllowedError') alert('Could not share screen: ' + err.message)
  }
}

function stopCast() {
  recorder?.stop()
  stream?.getTracks().forEach(t => t.stop())
  recorder = stream = null
  const preview = document.getElementById('preview')
  preview.srcObject = null
  preview.classList.remove('visible')
  setCastStatus('', 'Idle')
  document.getElementById('cast-btn').style.display  = 'block'
  document.getElementById('stop-btn').style.display  = 'none'
  document.getElementById('share-section').style.display = 'none'
}

function setCastStatus(state, label) {
  document.getElementById('cast-dot').className   = `dot ${state}`
  document.getElementById('cast-label').textContent = label
}

function copyLink() {
  navigator.clipboard.writeText(document.getElementById('share-url').value)
    .then(() => {
      const btn = event.target
      btn.textContent = 'Copied!'
      setTimeout(() => btn.textContent = 'Copy', 1500)
    })
}

// ═══ VIEWER LOGIC ══════════════════════════════════════════════════════════
const viewerEl     = document.getElementById('viewer')
const viewerStatus = document.getElementById('viewer-status')

let mediaSource  = null
let sourceBuffer = null
const chunkQueue = []
let bufReady     = false

function initMediaSource(mimeType) {
  viewerStatus.style.display = 'none'
  viewerEl.style.display     = 'block'

  mediaSource = new MediaSource()
  viewerEl.src = URL.createObjectURL(mediaSource)

  mediaSource.addEventListener('sourceopen', () => {
    try {
      sourceBuffer = mediaSource.addSourceBuffer(mimeType)
      sourceBuffer.mode = 'sequence' // removes timestamp gaps
      sourceBuffer.addEventListener('updateend', () => {
        bufReady = true
        // Trim buffer: keep only last 20s to avoid memory growth
        if (sourceBuffer.buffered.length > 0) {
          const end = sourceBuffer.buffered.end(0)
          if (end > 30 && !sourceBuffer.updating) {
            bufReady = false
            sourceBuffer.remove(0, end - 20)
            return
          }
        }
        flushQueue()
      })
      bufReady = true
      flushQueue()
    } catch (e) {
      viewerStatus.textContent = 'Codec not supported: ' + mimeType
      viewerStatus.style.display = 'block'
    }
  })
}

function flushQueue() {
  if (!sourceBuffer || !bufReady || chunkQueue.length === 0 || sourceBuffer.updating) return
  bufReady = false
  try {
    sourceBuffer.appendBuffer(chunkQueue.shift())
  } catch {
    bufReady = true // quota exceeded or aborted – skip chunk
  }
}

ws.onopen = () => {
  if (isViewer) ws.send(JSON.stringify({ type: 'watch' }))
}

ws.onmessage = e => {
  if (typeof e.data === 'string') {
    const msg = JSON.parse(e.data)
    switch (msg.type) {
      case 'live':
        initMediaSource(msg.mimeType)
        break
      case 'waiting':
        viewerStatus.textContent = 'Waiting for broadcast…'
        break
      case 'ended':
        viewerStatus.textContent = 'Broadcast ended.'
        viewerStatus.style.display = 'block'
        break
    }
    return
  }

  // Binary: video chunk
  if (isViewer) {
    chunkQueue.push(e.data)
    flushQueue()
  }
}

ws.onclose = () => {
  if (isViewer) {
    viewerStatus.textContent = 'Disconnected from server.'
    viewerStatus.style.display = 'block'
  }
}
</script>
</body>
</html>
